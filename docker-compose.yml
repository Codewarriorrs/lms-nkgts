version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: lms-nkgts-postgres
    environment:
      POSTGRES_USER: yesa
      POSTGRES_PASSWORD: pacarcarmen
      POSTGRES_DB: lms_nkgts
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: